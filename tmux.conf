# tmux Configuration - Visible Session & Window Labels
# Compatible with tmux 3.x on macOS

# ============================================================================
# STATUS BAR — Matrix Theme
# ============================================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#0d0d0d,fg=#00ff41'

# Left: windows only (session name is in kitty tab)
set -g status-left-length 0
set -g status-left ''
set -g status-justify left

# Window tabs — no index numbers, no highlight box
set -g window-status-separator '#[fg=#003b00] │ '
set -g window-status-current-style 'fg=#003b00,bg=#0d0d0d,bold'
set -g window-status-current-format ' #W '
set -g window-status-style 'fg=#003b00,bg=#0d0d0d'
set -g window-status-format ' #W '

# Right: system info + time
set -g status-right-length 120
set -g status-right '#[fg=#003b00]#(~/.config/tmux/status.sh) #[fg=#003b00]│ %m/%d %H:%M '

# Window numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ============================================================================
# GENERAL SETTINGS
# ============================================================================

set -g mouse on
set -g history-limit 10000

# macOS keychain access in tmux (fixes Claude Code login prompts)
set -g default-command "reattach-to-user-namespace -l ${SHELL}"

# Auto-rename windows to current dir
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Push session name to terminal (kitty) title
set -g set-titles on
set -g set-titles-string '#S'

# ============================================================================
# VISUAL — Matrix Theme
# ============================================================================

set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',xterm-kitty:Tc'

# Pane borders
set -g pane-border-style 'fg=#003b00'
set -g pane-active-border-style 'fg=#00ff41'

# Messages
set -g message-style 'bg=#00ff41,fg=#0d0d0d,bold'

# ============================================================================
# KEY BINDINGS FOR RENAMING
# ============================================================================

# Prefix + , to rename current window (default binding)
# Prefix + $ to rename current session (default binding)

# Quick reload config: prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ============================================================================
# SESH - SESSION MANAGER (prefix + j)
# ============================================================================

bind-key j run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g config ^x zoxide ^d kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(/opt/homebrew/bin/fd -H -d 2 -t d -E .git . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+reload(sesh list --icons)' \
    --preview-window 'right:50%' \
)\""

# ============================================================================
# PLUGINS (TPM)
# ============================================================================

# Session persistence
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum settings - auto save/restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
